name: CI-CD AWS

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_USERS_REPOSITORY: fcg-users-api
  ECR_CATALOG_REPOSITORY: fcg-catalog-api
  ECR_PAYMENTS_REPOSITORY: fcg-payments-api
  ECR_GATEWAY_REPOSITORY: fcg-gateway-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore users-api solution
        run: dotnet restore ./users-api_fase3/FCGUsersAPI.sln

      - name: Build users-api solution
        run: dotnet build ./users-api_fase3/FCGUsersAPI.sln --configuration Release --no-restore

      - name: Test users-api solution
        run: dotnet test ./users-api_fase3/FCGUsersAPI.sln --configuration Release --no-build --verbosity normal

      - name: Restore catalog-api solution
        run: dotnet restore ./catalog-api_fase3/FCGCatalogAPI.sln

      - name: Build catalog-api solution
        run: dotnet build ./catalog-api_fase3/FCGCatalogAPI.sln --configuration Release --no-restore

      - name: Test catalog-api solution
        run: dotnet test ./catalog-api_fase3/FCGCatalogAPI.sln --configuration Release --no-build --verbosity normal

      - name: Restore payments-api solution
        run: dotnet restore ./payments-api_fase3/FCGPaymentsAPI.sln

      - name: Build payments-api solution
        run: dotnet build ./payments-api_fase3/FCGPaymentsAPI.sln --configuration Release --no-restore

      - name: Test payments-api solution
        run: dotnet test ./payments-api_fase3/FCGPaymentsAPI.sln --configuration Release --no-build --verbosity normal

      - name: Restore gateway solution
        run: dotnet restore ./GatewayAPI/GatewayAPI.csproj

      - name: Build gateway solution
        run: dotnet build ./GatewayAPI/GatewayAPI.csproj --configuration Release --no-restore

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          aws ecr describe-repositories --repository-names "$ECR_USERS_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_USERS_REPOSITORY"

          aws ecr describe-repositories --repository-names "$ECR_CATALOG_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_CATALOG_REPOSITORY"

          aws ecr describe-repositories --repository-names "$ECR_PAYMENTS_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_PAYMENTS_REPOSITORY"

          aws ecr describe-repositories --repository-names "$ECR_GATEWAY_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_GATEWAY_REPOSITORY"

      - name: Set image tags
        shell: bash
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          TAG="latest"

          echo "USERS_IMAGE=${REGISTRY}/${ECR_USERS_REPOSITORY}:${TAG}" >> $GITHUB_ENV
          echo "CATALOG_IMAGE=${REGISTRY}/${ECR_CATALOG_REPOSITORY}:${TAG}" >> $GITHUB_ENV
          echo "PAYMENTS_IMAGE=${REGISTRY}/${ECR_PAYMENTS_REPOSITORY}:${TAG}" >> $GITHUB_ENV
          echo "GATEWAY_IMAGE=${REGISTRY}/${ECR_GATEWAY_REPOSITORY}:${TAG}" >> $GITHUB_ENV

      - name: Build users-api image
        run: docker build -t ${{ env.USERS_IMAGE }} ./users-api_fase3

      - name: Build catalog-api image
        run: docker build -t ${{ env.CATALOG_IMAGE }} ./catalog-api_fase3

      - name: Build payments-api image
        run: docker build -t ${{ env.PAYMENTS_IMAGE }} ./payments-api_fase3

      - name: Build gateway-api image
        run: docker build -t ${{ env.GATEWAY_IMAGE }} ./GatewayAPI

      - name: Push users-api image
        run: docker push ${{ env.USERS_IMAGE }}

      - name: Push catalog-api image
        run: docker push ${{ env.CATALOG_IMAGE }}

      - name: Push payments-api image
        run: docker push ${{ env.PAYMENTS_IMAGE }}

      - name: Push gateway-api image
        run: docker push ${{ env.GATEWAY_IMAGE }}

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment package
        shell: bash
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package

          cp observability/docker-compose.yml deploy-package/
          cp observability/docker-compose.aws.yml deploy-package/

          cat > deploy-package/.env <<EOF
          SQL_SA_PASSWORD=${{ secrets.SQL_SA_PASSWORD }}
          JWT_ISSUER=${{ secrets.JWT_ISSUER }}
          JWT_KEY=${{ secrets.JWT_KEY }}
          ADMIN_NAME=${{ secrets.ADMIN_NAME }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          DD_API_KEY=${{ secrets.DD_API_KEY }}
          DD_SITE=${{ secrets.DD_SITE }}
          INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
          NOTIFICATIONS_QUEUE_URL=${{ secrets.NOTIFICATIONS_QUEUE_URL }}
          PURCHASE_CREATED_QUEUE_URL=${{ secrets.PURCHASE_CREATED_QUEUE_URL }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          PAYMENTS_API_BASE_URL=http://payments-api:8080
          CATALOG_API_BASE_URL=http://catalog-api:8080
          USERS_API_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fcg-users-api:latest
          CATALOG_API_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fcg-catalog-api:latest
          PAYMENTS_API_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fcg-payments-api:latest
          GATEWAY_API_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fcg-gateway-api:latest
          EOF

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy-package/docker-compose.yml,deploy-package/docker-compose.aws.yml,deploy-package/.env"
          target: "/home/${{ secrets.EC2_USER }}/app"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /home/${{ secrets.EC2_USER }}/app
            cd /home/${{ secrets.EC2_USER }}/app

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            docker compose -f docker-compose.aws.yml --env-file .env pull
            docker compose -f docker-compose.aws.yml --env-file .env up -d --remove-orphans

            docker ps