name: CI-CD AWS

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_USERS_REPOSITORY: fcg-users-api
  ECR_CATALOG_REPOSITORY: fcg-catalog-api
  ECR_PAYMENTS_REPOSITORY: fcg-payments-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      users_image: ${{ steps.meta.outputs.users_image }}
      catalog_image: ${{ steps.meta.outputs.catalog_image }}
      payments_image: ${{ steps.meta.outputs.payments_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          aws ecr describe-repositories --repository-names "$ECR_USERS_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_USERS_REPOSITORY"

          aws ecr describe-repositories --repository-names "$ECR_CATALOG_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_CATALOG_REPOSITORY"

          aws ecr describe-repositories --repository-names "$ECR_PAYMENTS_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_PAYMENTS_REPOSITORY"

      - name: Set image tags
        id: meta
        shell: bash
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          TAG="${GITHUB_SHA}"

          echo "users_image=${REGISTRY}/${ECR_USERS_REPOSITORY}:${TAG}" >> $GITHUB_OUTPUT
          echo "catalog_image=${REGISTRY}/${ECR_CATALOG_REPOSITORY}:${TAG}" >> $GITHUB_OUTPUT
          echo "payments_image=${REGISTRY}/${ECR_PAYMENTS_REPOSITORY}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build users-api image
        run: |
          docker build -t ${{ steps.meta.outputs.users_image }} ./users-api_fase3

      - name: Build catalog-api image
        run: |
          docker build -t ${{ steps.meta.outputs.catalog_image }} ./catalog-api_fase3

      - name: Build payments-api image
        run: |
          docker build -t ${{ steps.meta.outputs.payments_image }} ./payments-api_fase3

      - name: Push users-api image
        run: docker push ${{ steps.meta.outputs.users_image }}

      - name: Push catalog-api image
        run: docker push ${{ steps.meta.outputs.catalog_image }}

      - name: Push payments-api image
        run: docker push ${{ steps.meta.outputs.payments_image }}

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment package
        shell: bash
        run: |
          mkdir deploy-package
          cp observability/docker-compose.yml deploy-package/
          cp observability/docker-compose.aws.yml deploy-package/

          cat > deploy-package/.env <<EOF
          SQL_SA_PASSWORD=${{ secrets.SQL_SA_PASSWORD }}
          JWT_ISSUER=${{ secrets.JWT_ISSUER }}
          JWT_KEY=${{ secrets.JWT_KEY }}
          ADMIN_NAME=${{ secrets.ADMIN_NAME }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          DD_API_KEY=${{ secrets.DD_API_KEY }}
          DD_SITE=${{ secrets.DD_SITE }}
          USERS_API_IMAGE=${{ needs.build-and-push.outputs.users_image }}
          CATALOG_API_IMAGE=${{ needs.build-and-push.outputs.catalog_image }}
          PAYMENTS_API_IMAGE=${{ needs.build-and-push.outputs.payments_image }}
          EOF

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy-package/*"
          target: "/home/${{ secrets.EC2_USER }}/app"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/app

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            docker compose -f docker-compose.yml -f docker-compose.aws.yml --env-file .env pull
            docker compose -f docker-compose.yml -f docker-compose.aws.yml --env-file .env up -d --remove-orphans

            docker ps